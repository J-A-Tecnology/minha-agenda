<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda Ultimate</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Variáveis de Cores para Temas Padrão (Modo Claro) */
        :root {
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #7f8c8d;
            --border-color: #dcdde1;
            --header-bg: #ffffff;
            --sidebar-bg: #2c3e50;
        }

        /* Variáveis para o Modo Escuro */
        [data-theme="escuro"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --header-bg: #1e1e1e;
            --sidebar-bg: #181818;
        }

        /* Variáveis para o Modo Azul Noturno */
        [data-theme="azul-noturno"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-bg: #1e293b;
            --sidebar-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-body); padding: 20px; color: var(--text-main); overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        /* Cabeçalho */
        .header-main { display: flex; justify-content: space-between; align-items: center; background-color: var(--header-bg); padding: 15px 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background-color: #34495e; color: white; border: none; padding: 10px 12px; border-radius: 6px; font-size: 18px; cursor: pointer; }
        .title-area h1 { font-size: 24px; color: #3498db; }
        .auth-block { margin-top: 8px; min-height: 45px; display: block !important; }

        /* Relógio Digital */
        .clock-container { background-color: #1a252f; color: #fff; padding: 10px 20px; border-radius: 6px; text-align: right; font-weight: bold; }
        .clock-time { font-size: 20px; letter-spacing: 1px; color: #3498db; }
        .clock-date { font-size: 11px; color: #bdc3c7; margin-top: 2px; }

        /* Menu Lateral (Sidebar) */
        .sidebar { position: fixed; top: 0; left: -380px; width: 380px; height: 100%; background-color: var(--sidebar-bg); color: white; padding: 25px; box-shadow: 4px 0 10px rgba(0,0,0,0.2); transition: left 0.3s ease-in-out; z-index: 2000; overflow-y: auto; }
        .sidebar.active { left: 0 !important; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .sidebar-close { background: none; border: none; color: #bdc3c7; font-size: 20px; cursor: pointer; }
        
        /* Abas do Menu */
        .menu-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 8px 4px; background: #34495e; border: none; color: #bdc3c7; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Aba Personalização */
        .theme-select-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .theme-option-btn { padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-align: left; color: white; }

        /* Painéis e Listas Internas do Menu */
        .stats-panel { background: #34495e; padding: 15px; border-radius: 6px; }
        .stat-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .trash-item { background: #34495e; padding: 10px; border-radius: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .notes-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .note-input-title, .note-input-body { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 13px; color: #333; }
        .note-card { background: #f1c40f; color: #2c3e50; padding: 12px; border-radius: 6px; position: relative; margin-bottom: 10px; }
        .btn-delete-note { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #c0392b; cursor: pointer; }

        /* Seletores de Modos de Visualização Principal */
        .view-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .view-btn { padding: 10px 20px; border: none; background-color: var(--bg-card); color: var(--text-main); font-weight: bold; border-radius: 20px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: all 0.2s; border: 1px solid var(--border-color); }
        .view-btn.active { background-color: #3498db; color: white; border-color: #3498db; }

        /* Navegação e Cards */
        .navigation-bar { display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-card); padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border-color); }
        .nav-btn { background-color: #2980b9; color: white; border: none; padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .current-date { font-size: 18px; font-weight: bold; }
        .card-form, .tasks-container { background-color: var(--bg-card); padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border-color); }
        
        /* Formulários */
        .input-text, .select-field, .input-date, .input-time { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; background-color: var(--bg-body); color: var(--text-main); }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-col { flex: 1; min-width: 150px; }
        .btn-add { width: 100%; background-color: #2a9d8f; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* Estruturas de Visualização Avançada */
        /* Visão de Semana */
        .week-view-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .week-day-card { background-color: var(--bg-card); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); cursor: pointer; text-align: center; }
        .week-day-card.selected { border-color: #3498db; background-color: rgba(52, 152, 219, 0.1); }
        .week-day-title { font-weight: bold; font-size: 14px; }
        .week-day-date { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .week-day-badge { display: inline-block; background: #3498db; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; margin-top: 6px; font-weight: bold; }

        /* Visão de Mês (Calendário Grid) */
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background-color: var(--border-color); padding: 5px; border-radius: 6px; }
        .month-grid-header { font-weight: bold; text-align: center; padding: 8px 0; background-color: var(--bg-card); font-size: 12px; color: var(--text-muted); }
        .month-cell { background-color: var(--bg-card); min-height: 75px; padding: 6px; position: relative; cursor: pointer; transition: background 0.2s; }
        .month-cell:hover { background-color: rgba(52, 152, 219, 0.05); }
        .month-cell.current-active { background-color: rgba(52, 152, 219, 0.12); border: 1px solid #3498db; }
        .month-cell.other-month { opacity: 0.35; }
        .month-day-num { font-weight: bold; font-size: 13px; }
        .month-task-indicator { background: #e67e22; width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 2px; }
        .month-indicators-wrapper { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 2px; }

        /* Cards de Itens de Tarefas */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background-color: var(--bg-body); border-radius: 4px; margin-top: 10px; border: 1px solid var(--border-color); }
        .task-left-wrapper { display: flex; align-items: center; gap: 12px; flex: 1; }
        .task-item.cor-azul { border-left: 5px solid #3498db; }
        .task-item.cor-vermelho { border-left: 5px solid #e74c3c; }
        .task-item.cor-verde { border-left: 5px solid #2ecc71; }
        .task-item.cor-amarelo { border-left: 5px solid #f1c40f; }
        .check-btn { background: none; border: 2px solid var(--text-muted); width: 20px; height: 20px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 10px; }
        .task-item.completed { opacity: 0.55; }
        .task-item.completed .check-btn { background-color: #2ecc71; border-color: #2ecc71; color: white; }
        .task-item.completed .task-title-text { text-decoration: line-through; color: var(--text-muted); }
        .task-info { display: flex; flex-direction: column; gap: 4px; }
        .task-title-text { font-weight: bold; font-size: 15px; }
        .task-time-text { font-size: 12px; color: var(--text-muted); }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .sidebar-overlay.active { display: block !important; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Painel de Controle</h3>
            <button class="sidebar-close" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="menu-tabs">
            <button class="tab-btn active" id="tab-link-stats" onclick="switchTab('stats')"><i class="fa-solid fa-chart-pie"></i> Índices</button>
            <button class="tab-btn" id="tab-link-notes" onclick="switchTab('notes')"><i class="fa-regular fa-sticky-note"></i> Notas</button>
            <button class="tab-btn" id="tab-link-trash" onclick="switchTab('trash')"><i class="fa-solid fa-trash"></i> Lixeira (<span id="trash-count-badge">0</span>)</button>
            <button class="tab-btn" id="tab-link-theme" onclick="switchTab('theme')"><i class="fa-solid fa-palette"></i> Aparência</button>
        </div>
        
        <div class="tab-content active" id="tab-content-stats">
            <div class="stats-panel">
                <h4>Seu Relatório Geral</h4>
                <div class="stat-line"><span>Total Criadas:</span> <strong id="stat-total">0</strong></div>
                <div class="stat-line"><span>Pendentes:</span> <strong id="stat-pendentes" style="color: #f1c40f;">0</strong></div>
                <div class="stat-line"><span>Concluídas:</span> <strong id="stat-concluidas" style="color: #2ecc71;">0</strong></div>
            </div>
        </div>

        <div class="tab-content" id="tab-content-notes">
            <div class="notes-form">
                <input type="text" id="note-title" class="note-input-title" placeholder="Título da Nota...">
                <textarea id="note-body" class="note-input-body" placeholder="Escreva sua anotação aqui..."></textarea>
                <button style="background: #2ecc71; color: white; border: none; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer;" onclick="criarNota()">Criar Nota</button>
            </div>
            <div id="notes-list-target"></div>
        </div>

        <div class="tab-content" id="tab-content-trash">
            <div class="trash-list" id="trash-list-target"></div>
        </div>

        <div class="tab-content" id="tab-content-theme">
            <h4 style="font-size: 12px; text-transform: uppercase; color:#bdc3c7;">Selecione um Tema</h4>
            <div class="theme-select-box">
                <button class="theme-option-btn" style="background: #ffffff; color: #333; border: 1px solid #ccc;" onclick="mudarTema('claro')">☀️ Modo Claro (Padrão)</button>
                <button class="theme-option-btn" style="background: #222222; color: #fff;" onclick="mudarTema('escuro')">🌙 Modo Escuro (Dark)</button>
                <button class="theme-option-btn" style="background: #1e293b; color: #38bdf8;" onclick="mudarTema('azul-noturno')">🌌 Azul Noturno</button>
            </div>
        </div>
    </div>

    <header class="header-main">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <div class="title-area">
                <h1>Minha Agenda Pro</h1>
                <div class="auth-block">
                    <div id="g_id_onload" data-client_id="884588851940-hu3aqqoc1ciibip94o8r5kn1snraahom.apps.googleusercontent.com" data-callback="onSignIn" data-auto_prompt="false"></div>
                    <div class="g_id_signin" data-type="standard"></div>
                </div>
            </div>
        </div>
        <div class="clock-container">
            <div class="clock-time" id="live-clock">00:00:00</div>
            <div class="clock-date" id="live-date">22/05/2026</div>
        </div>
    </header>

    <nav class="view-switcher">
        <button class="view-btn active" id="btn-view-dia" onclick="alterarModoVisualizacao('dia')">Dia</button>
        <button class="view-btn" id="btn-view-semana" onclick="alterarModoVisualizacao('semana')">Semana</button>
        <button class="view-btn" id="btn-view-mes" onclick="alterarModoVisualizacao('mes')">Mês</button>
    </nav>

    <div class="day-label" id="day-of-week-label">Sexta-Feira</div>

    <section class="navigation-bar">
        <button class="nav-btn" onclick="navegarData(-1)"><i class="fa-solid fa-caret-left"></i> Anterior</button>
        <span class="current-date" id="display-date">22/05/2026</span>
        <button class="nav-btn" onclick="navegarData(1)">Próximo <i class="fa-solid fa-caret-right"></i></button>
    </section>

    <div id="container-visao-semana" style="display: none;">
        <div class="week-view-container" id="week-grid-target"></div>
    </div>

    <div id="container-visao-mes" style="display: none;" class="card-form">
        <div class="month-grid" id="month-grid-target"></div>
    </div>

    <main class="card-form" id="main-task-form">
        <h2 class="card-title"><i class="fa-solid fa-plus"></i> Nova Tarefa</h2>
        <div class="form-group">
            <label>Descrição da Tarefa</label>
            <input type="text" class="input-text" id="task-name" placeholder="Ex: Academia, Reunião...">
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>Categoria (Cor)</label>
                <select class="select-field" id="task-category">
                    <option value="azul">🔵 Padrão (Azul)</option>
                    <option value="vermelho">🔴 Urgente (Vermelho)</option>
                    <option value="verde">🟢 Pessoal (Verde)</option>
                    <option value="amarelo">🟡 Trabalho (Amarelo)</option>
                </select>
            </div>
            <div class="form-col">
                <label>Data</label>
                <input type="text" class="input-date" id="task-date-input" value="22/05/2026" readonly>
            </div>
            <div class="form-col">
                <label>Horário</label>
                <input type="time" class="input-time" id="task-time" value="14:00">
            </div>
        </div>
        <button type="button" class="btn-add" onclick="salvarTarefa()">Adicionar na Agenda</button>
    </main>

    <section class="tasks-container">
        <h3 id="tasks-list-title" style="font-size: 14px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Tarefas</h3>
        <div id="tasks-list"></div>
    </section>

    <script>
        let dataAtual = new Date("2026-05-22T00:00:00");
        let modoVisualizacao = 'dia'; // 'dia', 'semana' ou 'mes'
        
        let listaDeTarefas = JSON.parse(localStorage.getItem('minha_agenda_tarefas')) || [];
        let lixeiraDeTarefas = JSON.parse(localStorage.getItem('minha_agenda_lixeira')) || [];
        let listaDeNotas = JSON.parse(localStorage.getItem('minha_agenda_notas')) || [];

        document.addEventListener('DOMContentLoaded', function () {
            const temaSalvo = localStorage.getItem('minha_agenda_tema') || 'claro';
            mudarTema(temaSalvo);
            startClock();
            atualizarInterface();
            renderizarNotas();
            renderizarLixeira();
        });

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').textContent = now.toTimeString().split(' ')[0];
                const dia = String(now.getDate()).padStart(2, '0');
                const mes = String(now.getMonth() + 1).padStart(2, '0');
                document.getElementById('live-date').textContent = `${dia}/${mes}/${now.getFullYear()}`;
            }, 1000);
        }

        function mudarTema(tema) {
            document.documentElement.setAttribute('data-theme', tema);
            localStorage.setItem('minha_agenda_tema', tema);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-link-${tabName}`).classList.add('active');
            document.getElementById(`tab-content-${tabName}`).classList.add('active');
        }

        function alterarModoVisualizacao(modo) {
            modoVisualizacao = modo;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-view-${modo}`).classList.add('active');
            
            document.getElementById('container-visao-semana').style.display = modo === 'semana' ? 'block' : 'none';
            document.getElementById('container-visao-mes').style.display = modo === 'mes' ? 'block' : 'none';
            
            atualizarInterface();
        }

        function navegarData(direcao) {
            if (modoVisualizacao === 'dia') {
                dataAtual.setDate(dataAtual.getDate() + direcao);
            } else if (modoVisualizacao === 'semana') {
                dataAtual.setDate(dataAtual.getDate() + (direcao * 7));
            } else if (modoVisualizacao === 'mes') {
                dataAtual.setMonth(dataAtual.getMonth() + direcao);
            }
            atualizarInterface();
        }

        function formatarDataString(dateObj) {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            return `${d}/${m}/${dateObj.getFullYear()}`;
        }

        function atualizarInterface() {
            const dataFormatada = formatarDataString(dataAtual);
            const diasSemana = ["Domingo", "Segunda-Feira", "Terça-Feira", "Quarta-Feira", "Quinta-Feira", "Sexta-Feira", "Sábado"];
            const mesesAno = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

            document.getElementById('task-date-input').value = dataFormatada;

            if (modoVisualizacao === 'dia') {
                document.getElementById('day-of-week-label').style.display = 'block';
                document.getElementById('day-of-week-label').textContent = diasSemana[dataAtual.getDay()];
                document.getElementById('display-date').textContent = dataFormatada;
                document.getElementById('tasks-list-title').textContent = "Tarefas do Dia";
            } else if (modoVisualizacao === 'semana') {
                document.getElementById('day-of-week-label').style.display = 'none';
                document.getElementById('display-date').textContent = `Semana de ${dataFormatada}`;
                document.getElementById('tasks-list-title').textContent = "Tarefas do Dia Selecionado";
                renderizarGradeSemana();
            } else if (modoVisualizacao === 'mes') {
                document.getElementById('day-of-week-label').style.display = 'none';
                document.getElementById('display-date').textContent = `${mesesAno[dataAtual.getMonth()]} de ${dataAtual.getFullYear()}`;
                document.getElementById('tasks-list-title').textContent = "Tarefas do Dia Selecionado";
                renderizarGradeMes();
            }

            renderizarTarefas();
            atualizarEstatisticasMenu();
        }

        function renderizarGradeSemana() {
            const grid = document.getElementById('week-grid-target');
            grid.innerHTML = "";
            
            let dataInicio = new Date(dataAtual);
            // Começa no domingo da semana atual
            dataInicio.setDate(dataInicio.getDate() - dataInicio.getDay());

            const diasSemanaCurto = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

            for (let i = 0; i < 7; i++) {
                let diaLoop = new Date(dataInicio);
                diaLoop.setDate(dataInicio.getDate() + i);
                let stringDia = formatarDataString(diaLoop);
                
                let count = listaDeTarefas.filter(t => t.data === stringDia).length;
                let classeSelecionado = stringDia === formatarDataString(dataAtual) ? 'selected' : '';

                let html = `
                    <div class="week-day-card ${classeSelecionado}" onclick="selecionarDataDireta('${diaLoop.toISOString()}')">
                        <div class="week-day-title">${diasSemanaCurto[i]}</div>
                        <div class="week-day-date">${diaLoop.getDate()}</div>
                        ${count > 0 ? `<span class="week-day-badge">${count} tfs</span>` : ''}
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            }
        }

        function renderizarGradeMes() {
            const grid = document.getElementById('month-grid-target');
            grid.innerHTML = "";

            const diasSemanaCurto = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
            diasSemanaCurto.forEach(d => {
                grid.insertAdjacentHTML('beforeend', `<div class="month-grid-header">${d}</div>`);
            });

            let primeiroDiaMes = new Date(dataAtual.getFullYear(), dataAtual.getMonth(), 1);
            let folgasIniciais = primeiroDiaMes.getDay();

            let dataInicioGrid = new Date(primeiroDiaMes);
            dataInicioGrid.setDate(dataInicioGrid.getDate() - folgasIniciais);

            for (let k = 0; k < 35; k++) {
                let diaCell = new Date(dataInicioGrid);
                diaCell.setDate(dataInicioGrid.getDate() + k);
                let stringDia = formatarDataString(diaCell);

                let tarefasDoDia = listaDeTarefas.filter(t => t.data === stringDia);
                let outraMesClasse = diaCell.getMonth() !== dataAtual.getMonth() ? 'other-month' : '';
                let ativaClasse = stringDia === formatarDataString(dataAtual) ? 'current-active' : '';

                let indicators = "";
                tarefasDoDia.slice(0, 4).forEach(() => {
                    indicators += `<span class="month-task-indicator"></span>`;
                });

                let html = `
                    <div class="month-cell ${outraMesClasse} ${ativaClasse}" onclick="selecionarDataDireta('${diaCell.toISOString()}')">
                        <div class="month-day-num">${diaCell.getDate()}</div>
                        <div class="month-indicators-wrapper">${indicators}</div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            }
        }

        function selecionarDataDireta(isoString) {
            dataAtual = new Date(isoString);
            atualizarInterface();
        }

        /* --- GERENCIAMENTO DE TAREFAS --- */
        function salvarTarefa() {
            const inputNome = document.getElementById('task-name');
            const taskName = inputNome.value.trim();
            const taskTime = document.getElementById('task-time').value;
            const taskDate = document.getElementById('task-date-input').value.trim();
            const taskCategory = document.getElementById('task-category').value;
            
            if (!taskName) { alert("Preencha a descrição!"); return; }

            listaDeTarefas.push({
                id: Date.now(),
                nome: taskName,
                data: taskDate, 
                horario: taskTime || "Sem horário",
                categoria: taskCategory,
                concluida: false
            });

            localStorage.setItem('minha_agenda_tarefas', JSON.stringify(listaDeTarefas));
            inputNome.value = ""; 
            atualizarInterface();
        }

        function alternarConclusaoTarefa(id) {
            listaDeTarefas = listaDeTarefas.map(t => {
                if (t.id === id) t.concluida = !t.concluida;
                return t;
            });
            localStorage.setItem('minha_agenda_tarefas', JSON.stringify(listaDeTarefas));
            atualizarInterface();
        }

        function moverParaLixeira(id) {
            const item = listaDeTarefas.find(t => t.id === id);
            if (item) {
                lixeiraDeTarefas.push(item);
                listaDeTarefas = listaDeTarefas.filter(t => t.id !== id);
                localStorage.setItem('minha_agenda_tarefas', JSON.stringify(listaDeTarefas));
                localStorage.setItem('minha_agenda_lixeira', JSON.stringify(lixeiraDeTarefas));
                atualizarInterface();
                renderizarLixeira();
            }
        }

        function restaurarTarefa(id) {
            const item = lixeiraDeTarefas.find(t => t.id === id);
            if (item) {
                listaDeTarefas.push(item);
                lixeiraDeTarefas = lixeiraDeTarefas.filter(t => t.id !== id);
                localStorage.setItem('minha_agenda_tarefas', JSON.stringify(listaDeTarefas));
                localStorage.setItem('minha_agenda_lixeira', JSON.stringify(lixeiraDeTarefas));
                atualizarInterface();
                renderizarLixeira();
            }
        }

        function excluirDefinitivo(id) {
            lixeiraDeTarefas = lixeiraDeTarefas.filter(t => t.id !== id);
            localStorage.setItem('minha_agenda_lixeira', JSON.stringify(lixeiraDeTarefas));
            renderizarLixeira();
            atualizarEstatisticasMenu();
        }

        function renderizarTarefas() {
            const target = document.getElementById('tasks-list');
            const dataFmt = formatarDataString(dataAtual);
            const tarefasFiltradas = listaDeTarefas.filter(t => t.data === dataFmt);

            if (tarefasFiltradas.length === 0) {
                target.innerHTML = `<div class="no-tasks">Nenhuma tarefa para o dia ${dataFmt}.</div>`;
                return;
            }

            tarefasFiltradas.sort((a,b) => a.horario.localeCompare(b.horario));
            target.innerHTML = "";
            tarefasFiltradas.forEach(t => {
                let html = `
                    <div class="task-item cor-${t.categoria} ${t.concluida ? 'completed' : ''}">
                        <div class="task-left-wrapper">
                            <button class="check-btn" onclick="alternarConclusaoTarefa(${t.id})"><i class="fa-solid fa-check"></i></button>
                            <div class="task-info">
                                <span class="task-title-text">${t.nome}</span>
                                <span class="task-time-text"><i class="fa-regular fa-clock"></i> ${t.horario}</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="moverParaLixeira(${t.id})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                target.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderizarLixeira() {
            const container = document.getElementById('trash-list-target');
            document.getElementById('trash-count-badge').textContent = lixeiraDeTarefas.length;
            if (lixeiraDeTarefas.length === 0) { container.innerHTML = `<div style="font-size:12px; text-align:center; padding:10px;">Vazia.</div>`; return; }
            container.innerHTML = "";
            lixeiraDeTarefas.forEach(t => {
                let html = `
                    <div class="trash-item">
                        <div><strong style="color:#fff;">${t.nome}</strong><br><small>${t.data}</small></div>
                        <div>
                            <button class="btn-restore" onclick="restaurarTarefa(${t.id})"><i class="fa-solid fa-rotate-left"></i></button>
                            <button class="btn-destroy" onclick="excluirDefinitivo(${t.id})"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        /* --- BLOCO DE NOTAS --- */
        function criarNota() {
            const tit = document.getElementById('note-title');
            const bod = document.getElementById('note-body');
            if(!bod.value.trim()) return;

            listaDeNotas.push({ id: Date.now(), titulo: tit.value.trim() || "Nota", texto: bod.value.trim() });
            localStorage.setItem('minha_agenda_notas', JSON.stringify(listaDeNotas));
            tit.value = ""; bod.value = "";
            renderizarNotas();
        }

        function deletarNota(id) {
            listaDeNotas = listaDeNotas.filter(n => n.id !== id);
            localStorage.setItem('minha_agenda_notas', JSON.stringify(listaDeNotas));
            renderizarNotas();
        }

        function renderizarNotas() {
            const target = document.getElementById('notes-list-target');
            if (listaDeNotas.length === 0) { target.innerHTML = `<div style="font-size:12px; text-align:center; padding:10px;">Vazio.</div>`; return; }
            target.innerHTML = "";
            listaDeNotas.forEach(n => {
                let html = `
                    <div class="note-card">
                        <h5>${n.titulo}</h5><p>${n.texto}</p>
                        <button class="btn-delete-note" onclick="deletarNota(${n.id})"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
                target.insertAdjacentHTML('beforeend', html);
            });
        }

        function atualizarEstatisticasMenu() {
            document.getElementById('stat-total').textContent = listaDeTarefas.length;
            let concluidas = listaDeTarefas.filter(t => t.concluida).length;
            document.getElementById('stat-concluidas').textContent = concluidas;
            document.getElementById('stat-pendentes').textContent = listaDeTarefas.length - concluidas;
        }

        function onSignIn(response) {}
    </script>
</body>
</html>
