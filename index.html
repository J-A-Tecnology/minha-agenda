<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Agendamento Inteligente</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-status { background-color: #2e7d32; color: white; cursor: default; }
        .btn-backup { background-color: #0288d1; color: white; }
        .btn-restore { background-color: #f57c00; color: white; }
        
        .backup-controls {
            display: flex;
            gap: 10px;
        }
        #file-input { display: none; }

        .form-agenda {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 5px; color: #b3b3b3; }
        input, select {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-add {
            width: 100%;
            background-color: #00bcd4;
            color: black;
            font-size: 16px;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .lista-tarefas {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
        }
        .card-tarefa {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #00bcd4;
        }
        .info-tarefa {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .hora-tarefa { color: #00bcd4; font-weight: bold; }
        .titulo-tarefa { font-size: 16px; }
        .badge-tarefa {
            font-size: 12px;
            background-color: #3a3a3a;
            padding: 2px 6px;
            border-radius: 4px;
            width: max-content;
            color: #b3b3b3;
        }
        .btn-deletar {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        .texto-vazio {
            color: #b3b3b3;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <button class="btn btn-status" id="btn-status-conexao">✨ Modo Local Ativo (Sem Firebase)</button>
        
        <div class="backup-controls">
            <button class="btn btn-backup" onclick="exportarBackup()">📥 Salvar Backup</button>
            <button class="btn btn-restore" onclick="document.getElementById('file-input').click()">📤 Restaurar Backup</button>
            <input type="file" id="file-input" accept=".json" onchange="importarBackup(event)">
        </div>
    </div>

    <div class="form-agenda">
        <h2>+ Painel de Agendamento Inteligente</h2>
        <form id="form-tarefa" onsubmit="adicionarNovaTarefa(event)">
            <div class="form-group">
                <label>O que vai fazer?</label>
                <input type="text" id="tarefa-titulo" placeholder="Ex: Treino de Perna, Estudar Inglês..." required>
            </div>
            <div class="form-group">
                <label>Frequência / Rotina</label>
                <select id="tarefa-tipo">
                    <option value="Tarefa Única">Tarefa Única</option>
                    <option value="Rotina Diária">Rotina Diária</option>
                    <option value="Semanal">Semanal</option>
                </select>
            </div>
            <div class="form-group">
                <label>Horário</label>
                <input type="time" id="tarefa-hora" required>
            </div>
            <button type="submit" class="btn btn-add">Adicionar na Agenda (+XP)</button>
        </form>
    </div>

    <div class="lista-tarefas">
        <h3>TAREFAS DO DIA</h3>
        <div id="container-tarefas">
            </div>
    </div>
</div>

<script>
    // Gestão do Banco de Dados Local (Armazenamento no Navegador)
    const dbLocalStorage = {
        getTarefas: function() {
            const dados = localStorage.getItem('ja_agenda_tarefas');
            // Mantém as suas tarefas padrão salvas caso o banco inicie zerado
            return dados ? JSON.parse(dados) : [
                { id: "1779458301815", titulo: "João", hora: "13:00", tipo: "Tarefa Única" },
                { id: "1779457320288", titulo: "jodfa", hora: "09:08", tipo: "Rotina Diária" }
            ];
        },
        salvarTarefas: function(tarefas) {
            localStorage.setItem('ja_agenda_tarefas', JSON.stringify(tarefas));
        }
    };

    // Função de renderização do ícone da lixeira (Evita o erro de undefined)
    function renderizarLixeira(id) {
        return `<button type="button" onclick="removerTarefa('${id}')" class="btn-deletar" title="Apagar tarefa">🗑️</button>`;
    }

    // Adiciona uma nova atividade na memória local
    function adicionarNovaTarefa(event) {
        event.preventDefault();
        
        const titulo = document.getElementById('tarefa-titulo').value;
        const tipo = document.getElementById('tarefa-tipo').value;
        const hora = document.getElementById('tarefa-hora').value;
        const id = Date.now().toString();

        const novasTarefas = dbLocalStorage.getTarefas();
        novasTarefas.push({ id, titulo, hora, tipo });
        
        dbLocalStorage.salvarTarefas(novasTarefas);
        carregarTarefasNaTela();
        
        document.getElementById('form-tarefa').reset();
    }

    // Remove a atividade selecionada
    function removerTarefa(id) {
        if(confirm("Tens a certeza que desejas apagar esta atividade?")) {
            let tarefas = dbLocalStorage.getTarefas();
            tarefas = tarefas.filter(t => t.id !== id);
            dbLocalStorage.salvarTarefas(tarefas);
            carregarTarefasNaTela();
        }
    }

    // Desenha as atividades ordenadas por hora na interface
    function carregarTarefasNaTela() {
        const tarefas = dbLocalStorage.getTarefas();
        const container = document.getElementById('container-tarefas');
        
        if (!container) return;
        
        tarefas.sort((a, b) => a.hora.localeCompare(b.hora));
        
        if (tarefas.length === 0) {
            container.innerHTML = '<p class="texto-vazio">Nenhuma atividade agendada para hoje.</p>';
            return;
        }

        container.innerHTML = tarefas.map(tarefa => `
            <div class="card-tarefa" id="tarefa-${tarefa.id}">
                <div class="info-tarefa">
                    <span class="hora-tarefa">⏰ ${tarefa.hora}</span>
                    <span class="titulo-tarefa">${tarefa.titulo}</span>
                    <span class="badge-tarefa">${tarefa.tipo}</span>
                </div>
                <div class="acoes-tarefa">
                    ${renderizarLixeira(tarefa.id)}
                </div>
            </div>
        `).join('');
    }

    // ==========================================
    // SISTEMA DE SEGURANÇA: EXPORTAÇÃO E IMPORTAÇÃO
    // ==========================================

    function exportarBackup() {
        const tarefas = dbLocalStorage.getTarefas();
        const dadosTexto = JSON.stringify(tarefas, null, 2);
        
        const blob = new Blob([dadosTexto], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const linkTemp = document.createElement('a');
        linkTemp.href = url;
        linkTemp.download = `backup_agenda_${new Date().toISOString().split('T')[0]}.json`;
        
        document.body.appendChild(linkTemp);
        linkTemp.click();
        document.body.removeChild(linkTemp);
        URL.revokeObjectURL(url);
    }

    function importarBackup(event) {
        const arquivo = event.target.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = function(e) {
            try {
                const tarefasImportadas = JSON.parse(e.target.result);
                
                if (Array.isArray(tarefasImportadas)) {
                    dbLocalStorage.salvarTarefas(tarefasImportadas);
                    carregarTarefasNaTela();
                    alert("Backup restaurado com sucesso!");
                } else {
                    alert("Erro: O arquivo de backup não é compatível.");
                }
            } catch (erro) {
                alert("Erro ao ler o arquivo. Certifique-se de carregar o arquivo .json correto.");
            }
        };
        leitor.readAsText(arquivo);
        event.target.value = '';
    }

    window.renderizarLixeira = renderizarLixeira;
    window.removerTarefa = removerTarefa;
    
    document.addEventListener('DOMContentLoaded', () => {
        carregarTarefasNaTela();
    });
</script>

</body>
</html>
