<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; overflow-x: hidden; }
        
        /* Cabeçalho */
        .header-main { display: flex; justify-content: space-between; align-items: center; background-color: #fff; padding: 15px 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background-color: #34495e; color: white; border: none; padding: 10px 12px; border-radius: 6px; font-size: 18px; cursor: pointer; transition: background 0.2s; }
        .menu-btn:hover { background-color: #2c3e50; }
        .title-area h1 { font-size: 24px; color: #34495e; }
        
        .auth-block { margin-top: 8px; min-height: 45px; display: block !important; }

        /* Relógio Digital */
        .clock-container { background-color: #1a252f; color: #fff; padding: 10px 20px; border-radius: 6px; text-align: right; font-weight: bold; }
        .clock-time { font-size: 20px; letter-spacing: 1px; color: #3498db; }
        .clock-date { font-size: 11px; color: #bdc3c7; margin-top: 2px; }

        /* Menu Lateral (Sidebar) */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #2c3e50; color: white; padding: 25px; box-shadow: 4px 0 10px rgba(0,0,0,0.2); transition: left 0.3s ease-in-out; z-index: 2000; }
        .sidebar.active { left: 0 !important; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .sidebar-close { background: none; border: none; color: #bdc3c7; font-size: 20px; cursor: pointer; }
        .sidebar-close:hover { color: white; }
        .stats-panel { background: #34495e; padding: 15px; border-radius: 6px; margin-top: 20px; }
        .stats-panel h4 { margin-bottom: 10px; font-size: 14px; color: #3498db; text-transform: uppercase; }
        .stat-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }

        /* Overlay para fechar o menu ao clicar fora */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .sidebar-overlay.active { display: block !important; }

        /* Navegação */
        .navigation-bar { display: flex; justify-content: space-between; align-items: center; background-color: #fff; padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .nav-btn { background-color: #2980b9; color: white; border: none; padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .nav-btn:hover { background-color: #2471a3; }
        .current-date { font-size: 18px; font-weight: bold; color: #2c3e50; }

        /* Formulário */
        .card-form { background-color: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 16px; color: #2c3e50; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 6px; }
        .input-text { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 4px; font-size: 14px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-col { flex: 1; min-width: 150px; }
        .select-field, .input-date, .input-time { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 4px; background-color: #fff; font-size: 14px; height: 42px; }
        .notify-box { display: flex; align-items: center; gap: 8px; background-color: #f1f2f6; padding: 10px 15px; border-radius: 4px; height: 42px; width: 100%; justify-content: center; font-size: 13px; font-weight: bold; color: #2c3e50; cursor: pointer; }
        .btn-add { width: 100%; background-color: #2a9d8f; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .btn-add:hover { background-color: #21867a; }
        
        /* Container de Listagem */
        .tasks-container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .no-tasks { text-align: center; color: #95a5a6; font-size: 14px; padding: 15px 0; }
        .day-label { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 10px; text-transform: uppercase; }

        /* Cards Individuais de Tarefas */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background-color: #f8f9fa; border-radius: 4px; margin-top: 10px; transition: all 0.2s ease; }
        .task-left-wrapper { display: flex; align-items: center; gap: 12px; flex: 1; }
        
        /* Cores das Categorias */
        .task-item.cor-azul { border-left: 5px solid #3498db; }
        .task-item.cor-vermelho { border-left: 5px solid #e74c3c; }
        .task-item.cor-verde { border-left: 5px solid #2ecc71; }
        .task-item.cor-amarelo { border-left: 5px solid #f1c40f; }

        /* Checkbox customizado de conclusão */
        .check-btn { background: none; border: 2px solid #bdc3c7; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 10px; transition: all 0.2s; }
        .check-btn:hover { border-color: #2ecc71; color: #2ecc71; }
        
        /* Estilos para quando a tarefa está Concluída */
        .task-item.completed { opacity: 0.55; background-color: #f1f2f6; }
        .task-item.completed .check-btn { background-color: #2ecc71; border-color: #2ecc71; color: white; }
        .task-item.completed .task-title-text { text-decoration: line-through; color: #7f8c8d; }

        .task-info { display: flex; flex-direction: column; gap: 4px; }
        .task-title-text { font-weight: bold; color: #2c3e50; font-size: 15px; transition: color 0.2s; }
        .task-time-text { font-size: 12px; color: #7f8c8d; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; padding: 5px; }
        .btn-delete:hover { color: #c0392b; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Menu Agenda</h3>
            <button class="sidebar-close" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <p>Olá, Organização!</p>
        
        <div class="stats-panel">
            <h4>Seu Painel Geral</h4>
            <div class="stat-line"><span>Total cadastradas:</span> <strong id="stat-total">0</strong></div>
            <div class="stat-line"><span>Pendentes:</span> <strong id="stat-pendentes" style="color: #f1c40f;">0</strong></div>
            <div class="stat-line"><span>Concluídas:</span> <strong id="stat-concluidas" style="color: #2ecc71;">0</strong></div>
        </div>
    </div>

    <header class="header-main">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <div class="title-area">
                <h1>Minha Agenda</h1>
                <div class="auth-block">
                    <div id="g_id_onload"
                         data-client_id="884588851940-hu3aqoc1ciibip94o8r5kn1snraahom.apps.googleusercontent.com"
                         data-callback="onSignIn"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
                </div>
            </div>
        </div>
        <div class="clock-container">
            <div class="clock-time" id="live-clock">00:00:00</div>
            <div class="clock-date" id="live-date">22/05/2026</div>
        </div>
    </header>

    <div class="day-label" id="day-of-week-label">Sexta-Feira</div>

    <section class="navigation-bar">
        <button class="nav-btn" onclick="alterarDia(-1)"><i class="fa-solid fa-caret-left"></i> Voltar</button>
        <span class="current-date" id="display-date">22/05/2026</span>
        <button class="nav-btn" onclick="alterarDia(1)">Avançar <i class="fa-solid fa-caret-right"></i></button>
    </section>

    <main class="card-form">
        <h2 class="card-title"><i class="fa-solid fa-plus"></i> Nova Tarefa</h2>
        <div class="form-group">
            <label>O que você precisa fazer?</label>
            <input type="text" class="input-text" id="task-name" placeholder="Ex: Reunião com cliente ou Academia">
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>Tipo de Tarefa</label>
                <select class="select-field">
                    <option>Tarefa Única (Data/Hora específica)</option>
                </select>
            </div>
            <div class="form-col">
                <label>Categoria (Cor)</label>
                <select class="select-field" id="task-category">
                    <option value="azul">🔵 Padrão (Azul)</option>
                    <option value="vermelho">🔴 Urgente (Vermelho)</option>
                    <option value="verde">🟢 Pessoal (Verde)</option>
                    <option value="amarelo">🟡 Trabalho (Amarelo)</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>Data</label>
                <input type="text" class="input-date" id="task-date-input" value="22/05/2026" readonly>
            </div>
            <div class="form-col">
                <label>Horário (Opcional)</label>
                <input type="time" class="input-time" id="task-time" value="14:00">
            </div>
            <div class="form-col" style="display: flex; align-items: flex-end;">
                <label class="notify-box">
                    <input type="checkbox" id="task-notify"> 🔔 Notificar-me
                </label>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="salvarTarefa()">Adicionar na Agenda</button>
    </main>

    <section class="tasks-container">
        <h3 style="font-size: 14px; margin-bottom: 5px; color: #34495e; text-transform: uppercase; font-weight: bold;">Tarefas do Dia</h3>
        <div id="tasks-list">
            <div class="no-tasks">Nenhuma tarefa marcada para este dia.</div>
        </div>
    </section>

    <script>
        let dataAtual = new Date("2026-05-22T00:00:00");
        let listaDeTarefas = JSON.parse(localStorage.getItem('minha_agenda_tarefas')) || [];

        document.addEventListener('DOMContentLoaded', function () {
            startClock();
            atualizarInterfaceData();
        });

        function onSignIn(response) {
            const dataBase64 = response.credential.split('.')[1];
            const jsonString = window.atob(dataBase64);
            const usuario = JSON.parse(jsonString);
            alert("Bem-vindo, " + usuario.name);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').textContent = now.toTimeString().split(' ')[0];
                
                const dia = String(now.getDate()).padStart(2, '0');
                const mes = String(now.getMonth() + 1).padStart(2, '0');
                const ano = now.getFullYear();
                document.getElementById('live-date').textContent = `${dia}/${mes}/${ano}`;
            }, 1000);
        }

        // Função de abrir e fechar corrigida para alternar classes com segurança
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function alterarDia(diasParaSomar) {
            dataAtual.setDate(dataAtual.getDate() + diasParaSomar);
            atualizarInterfaceData();
        }

        function atualizarInterfaceData() {
            const dia = String(dataAtual.getDate()).padStart(2, '0');
            const mes = String(dataAtual.getMonth() + 1).padStart(2, '0');
            const ano = dataAtual.getFullYear();
            const dataFormatada = `${dia}/${mes}/${ano}`;

            const diasSemana = ["Domingo", "Segunda-Feira", "Terça-Feira", "Quarta-Feira", "Quinta-Feira", "Sexta-Feira", "Sábado"];
            const nomeDiaSemana = diasSemana[dataAtual.getDay()];

            document.getElementById('day-of-week-label').textContent = nomeDiaSemana;
            document.getElementById('display-date').textContent = dataFormatada;
            document.getElementById('task-date-input').value = dataFormatada;

            renderizarTarefas();
            atualizarEstatisticasMenu();
        }

        function salvarTarefa() {
            const inputNome = document.getElementById('task-name');
            const taskName = inputNome.value.trim();
            const taskTime = document.getElementById('task-time').value;
            const taskDate = document.getElementById('task-date-input').value.trim();
            const taskCategory = document.getElementById('task-category').value;
            
            if (!taskName) { 
                alert("Por favor, preencha o nome da tarefa!"); 
                return; 
            }

            const novaTarefa = {
                id: Date.now(),
                nome: taskName,
                data: taskDate, 
                horario: taskTime || "Sem horário",
                categoria: taskCategory,
                concluida: false
            };

            listaDeTarefas.push(novaTarefa);
            salvarNoStorage();
            
            inputNome.value = ""; 
            atualizarInterfaceData();
        }

        function alternarConclusaoTarefa(id) {
            listaDeTarefas = listaDeTarefas.map(tarefa => {
                if (tarefa.id === id) {
                    tarefa.concluida = !tarefa.concluida;
                }
                return tarefa;
            });
            salvarNoStorage();
            atualizarInterfaceData();
        }

        function deletarTarefa(id) {
            listaDeTarefas = listaDeTarefas.filter(tarefa => tarefa.id !== id);
            salvarNoStorage();
            atualizarInterfaceData();
        }

        function salvarNoStorage() {
            localStorage.setItem('minha_agenda_tarefas', JSON.stringify(listaDeTarefas));
        }

        function atualizarEstatisticasMenu() {
            const total = listaDeTarefas.length;
            const concluidas = listaDeTarefas.filter(t => t.concluida).length;
            const pendentes = total - concluidas;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pendentes').textContent = pendentes;
            document.getElementById('stat-concluidas').textContent = concluidas;
        }

        function renderizarTarefas() {
            const listaContainer = document.getElementById('tasks-list');
            const dataFormatadaAtual = document.getElementById('display-date').textContent.trim();
            const tarefasDoDia = listaDeTarefas.filter(tarefa => tarefa.data === dataFormatadaAtual);

            if (tarefasDoDia.length === 0) {
                listaContainer.innerHTML = `<div class="no-tasks">Nenhuma tarefa marcada para este dia.</div>`;
                return;
            }

            tarefasDoDia.sort((a, b) => a.horario.localeCompare(b.horario));
            listaContainer.innerHTML = ""; 
            
            tarefasDoDia.forEach(tarefa => {
                const classeConcluida = tarefa.concluida ? 'completed' : '';
                
                const itemHtml = `
                    <div class="task-item cor-${tarefa.categoria} ${classeConcluida}">
                        <div class="task-left-wrapper">
                            <button class="check-btn" onclick="alternarConclusaoTarefa(${tarefa.id})">
                                <i class="fa-solid fa-check"></i>
                            </button>
                            <div class="task-info">
                                <span class="task-title-text">${tarefa.nome}</span>
                                <span class="task-time-text"><i class="fa-regular fa-clock"></i> ${tarefa.horario}</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deletarTarefa(${tarefa.id})">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                listaContainer.insertAdjacentHTML('beforeend', itemHtml);
            });
        }
    </script>
</body>
</html>
