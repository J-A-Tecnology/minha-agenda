<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Agendamento Inteligente</title>
    <style>
        /* O DESIGN ORIGINAL DO TEU SITE */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Barra de Backup e Status */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
        }
        .btn-status { background-color: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: default; }
        .btn-backup { background-color: #0288d1; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-restore { background-color: #f57c00; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #file-input { display: none; }

        .form-agenda {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        /* Alinhamento dos teus campos originais */
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 8px; color: #b3b3b3; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        .btn-add {
            width: 100%;
            background-color: #1abc9c;
            color: white;
            font-size: 16px;
            padding: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Lista de Tarefas Estilizada */
        .lista-tarefas {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
        }
        .card-tarefa {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-tarefa {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .linha-topo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hora-tarefa { color: #1abc9c; font-weight: bold; }
        .data-tarefa { color: #888; font-size: 12px; }
        .titulo-tarefa { font-size: 18px; font-weight: 500; }
        .subtarefas-lista { font-size: 13px; color: #aaaaaa; margin-top: 4px; font-style: italic; }
        .badge-tarefa {
            font-size: 11px;
            background-color: #3a3a3a;
            padding: 3px 8px;
            border-radius: 4px;
            color: #b3b3b3;
        }
        .btn-deletar {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }
        .texto-vazio {
            color: #b3b3b3;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <button class="btn-status">✨ Modo Local Seguro Ativo</button>
        <div>
            <button class="btn-backup" onclick="exportarBackup()">📥 Salvar Backup</button>
            <button class="btn-restore" onclick="document.getElementById('file-input').click()">📤 Restaurar Backup</button>
            <input type="file" id="file-input" accept=".json" onchange="importarBackup(event)">
        </div>
    </div>

    <div class="form-agenda">
        <h2>+ Painel de Agendamento Inteligente</h2>
        <form id="form-tarefa" onsubmit="adicionarNovaTarefa(event)">
            
            <div class="form-group">
                <label>O que você vai fazer?</label>
                <input type="text" id="tarefa-titulo" placeholder="Ex: Treino de Perna, Estudar Inglês..." required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Frequência / Rotina</label>
                    <select id="tarefa-tipo">
                        <option value="Tarefa Única">Tarefa Única</option>
                        <option value="Rotina Diária">Rotina Diária</option>
                        <option value="Semanal">Semanal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoria (Cor)</label>
                    <select id="tarefa-cor">
                        <option value="#3498db">🔵 Padrão (Azul)</option>
                        <option value="#e74c3c">🔴 Importante (Vermelho)</option>
                        <option value="#2ecc71">🟢 Saúde (Verde)</option>
                        <option value="#f1c40f">🟡 Estudos (Amarelo)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ícone Temático</label>
                    <select id="tarefa-icone">
                        <option value="📌">📌 Geral</option>
                        <option value="💪">💪 Treino / Saúde</option>
                        <option value="📚">📚 Estudos</option>
                        <option value="💼">💼 Trabalho</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="tarefa-data" required>
                </div>
                <div class="form-group">
                    <label>Horário</label>
                    <input type="time" id="tarefa-hora" required>
                </div>
            </div>

            <div class="form-group">
                <label>Subtarefas / Checklist <span style="font-size:11px; color:#888;">(Separe os itens por vírgula)</span></label>
                <input type="text" id="tarefa-subtarefas" placeholder="Ex: Aquecimento, Agachamento, Cardio">
            </div>

            <button type="submit" class="btn-add">Adicionar na Agenda (+XP)</button>
        </form>
    </div>

    <div class="lista-tarefas">
        <h3>TAREFAS DO DIA</h3>
        <div id="container-tarefas">
            </div>
    </div>
</div>

<script>
    // Configuração do Banco Local Inteligente
    const dbLocalStorage = {
        getTarefas: function() {
            const dados = localStorage.getItem('ja_agenda_tarefas');
            return dados ? JSON.parse(dados) : [
                { id: "1", titulo: "João", hora: "13:00", data: new Date().toISOString().split('T')[0], tipo: "Tarefa Única", cor: "#3498db", icone: "📌", subtarefas: "Exemplo de item" },
                { id: "2", titulo: "jodfa", hora: "09:08", data: new Date().toISOString().split('T')[0], tipo: "Rotina Diária", cor: "#3498db", icone: "📌", subtarefas: "" }
            ];
        },
        salvarTarefas: function(tarefas) {
            localStorage.setItem('ja_agenda_tarefas', JSON.stringify(tarefas));
        }
    };

    function renderizarLixeira(id) {
        return `<button type="button" onclick="removerTarefa('${id}')" class="btn-deletar" title="Apagar tarefa">🗑️</button>`;
    }

    // Captura todos os teus campos originais na hora de salvar
    function adicionarNovaTarefa(event) {
        event.preventDefault();
        
        const titulo = document.getElementById('tarefa-titulo').value;
        const tipo = document.getElementById('tarefa-tipo').value;
        const cor = document.getElementById('tarefa-cor').value;
        const icone = document.getElementById('tarefa-icone').value;
        const data = document.getElementById('tarefa-data').value;
        const hora = document.getElementById('tarefa-hora').value;
        const subtarefas = document.getElementById('tarefa-subtarefas').value;
        const id = Date.now().toString();

        const novasTarefas = dbLocalStorage.getTarefas();
        novasTarefas.push({ id, titulo, tipo, cor, icone, data, hora, subtarefas });
        
        dbLocalStorage.salvarTarefas(novasTarefas);
        carregarTarefasNaTela();
        
        document.getElementById('form-tarefa').reset();
        configurarDataPadrao();
    }

    function removerTarefa(id) {
        if(confirm("Deseja apagar esta atividade?")) {
            let tarefas = dbLocalStorage.getTarefas();
            tarefas = tareas.filter(t => t.id !== id);
            dbLocalStorage.salvarTarefas(tarefas);
            carregarTarefasNaTela();
        }
    }

    // Desenha as tarefas respeitando as cores de categoria e ícones escolhidos
    function carregarTarefasNaTela() {
        const tarefas = dbLocalStorage.getTarefas();
        const container = document.getElementById('container-tarefas');
        
        if (!container) return;
        
        tarefas.sort((a, b) => a.hora.localeCompare(b.hora));
        
        if (tarefas.length === 0) {
            container.innerHTML = '<p class="texto-vazio">Nenhuma atividade agendada para hoje.</p>';
            return;
        }

        container.innerHTML = tarefas.map(tarefa => {
            // Formata a data de AAAA-MM-DD para DD/MM/AAAA
            const dataFormatada = tarefa.data ? tarefa.data.split('-').reverse().join('/') : '';
            
            return `
                <div class="card-tarefa" id="tarefa-${tarefa.id}" style="border-left: 6px solid ${tarefa.cor || '#3498db'};">
                    <div class="info-tarefa">
                        <div class="linha-topo">
                            <span class="hora-tarefa">⏰ ${tarefa.hora}</span>
                            <span class="data-tarefa">📅 ${dataFormatada}</span>
                            <span class="badge-tarefa">${tarefa.tipo}</span>
                        </div>
                        <div class="titulo-tarefa">${tarefa.icone || '📌'} ${tarefa.titulo}</div>
                        ${tarefa.subtarefas ? `<div class="subtarefas-lista">📋 Subtarefas: ${tarefa.subtarefas}</div>` : ''}
                    </div>
                    <div class="acoes-tarefa">
                        ${renderizarLixeira(tarefa.id)}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Sistema de Backup e Restauro (.json)
    function exportarBackup() {
        const tarefas = dbLocalStorage.getTarefas();
        const blob = new Blob([JSON.stringify(tarefas, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `backup_agenda_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function importarBackup(event) {
        const arquivo = event.target.files[0];
        if (!arquivo) return;
        const leitor = new FileReader();
        leitor.onload = function(e) {
            try {
                const tarefas = JSON.parse(e.target.result);
                if (Array.isArray(tarefas)) {
                    dbLocalStorage.salvarTarefas(tarefas);
                    carregarTarefasNaTela();
                    alert("Backup carregado com sucesso!");
                }
            } catch (err) { alert("Arquivo inválido."); }
        };
        leitor.readAsText(arquivo);
    }

    function configurarDataPadrao() {
        const inputData = document.getElementById('tarefa-data');
        if(inputData) {
            inputData.value = new Date().toISOString().split('T')[0];
        }
    }

    window.renderizarLixeira = renderizarLixeira;
    window.removerTarefa = removerTarefa;
    
    document.addEventListener('DOMContentLoaded', () => {
        configurarDataPadrao();
        carregarTarefasNaTela();
    });
</script>

</body>
</html>
