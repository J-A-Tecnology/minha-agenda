<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda Pro</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; overflow-x: hidden; }
        
        /* Cabeçalho */
        .header-main { display: flex; justify-content: space-between; align-items: center; background-color: #fff; padding: 15px 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background-color: #34495e; color: white; border: none; padding: 10px 12px; border-radius: 6px; font-size: 18px; cursor: pointer; transition: background 0.2s; }
        .menu-btn:hover { background-color: #2c3e50; }
        .title-area h1 { font-size: 24px; color: #34495e; }
        
        .auth-block { margin-top: 8px; min-height: 45px; display: block !important; }

        /* Relógio Digital */
        .clock-container { background-color: #1a252f; color: #fff; padding: 10px 20px; border-radius: 6px; text-align: right; font-weight: bold; }
        .clock-time { font-size: 20px; letter-spacing: 1px; color: #3498db; }
        .clock-date { font-size: 11px; color: #bdc3c7; margin-top: 2px; }

        /* Menu Lateral (Sidebar) Expandido */
        .sidebar { position: fixed; top: 0; left: -380px; width: 380px; height: 100%; background-color: #2c3e50; color: white; padding: 25px; box-shadow: 4px 0 10px rgba(0,0,0,0.2); transition: left 0.3s ease-in-out; z-index: 2000; overflow-y: auto; }
        .sidebar.active { left: 0 !important; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .sidebar-close { background: none; border: none; color: #bdc3c7; font-size: 20px; cursor: pointer; }
        
        /* Abas no Menu Lateral */
        .menu-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 8px; background: #34495e; border: none; color: #bdc3c7; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Painel de Estatísticas */
        .stats-panel { background: #34495e; padding: 15px; border-radius: 6px; }
        .stats-panel h4 { margin-bottom: 10px; font-size: 14px; color: #3498db; text-transform: uppercase; }
        .stat-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }

        /* Seção da Lixeira */
        .trash-list { max-height: 300px; overflow-y: auto; }
        .trash-item { background: #34495e; padding: 10px; border-radius: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .trash-actions { display: flex; gap: 8px; }
        .btn-restore { background: none; border: none; color: #2ecc71; cursor: pointer; font-size: 14px; }
        .btn-destroy { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 14px; }

        /* Seção do Bloco de Notas */
        .notes-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .note-input-title { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 13px; }
        .note-input-body { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 13px; height: 60px; resize: none; }
        .btn-save-note { background: #2ecc71; color: white; border: none; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .notes-container-list { display: flex; flex-direction: column; gap: 10px; }
        .note-card { background: #f1c40f; color: #2c3e50; padding: 12px; border-radius: 6px; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.15); }
        .note-card h5 { font-size: 14px; margin-bottom: 4px; padding-right: 20px; font-weight: bold; }
        .note-card p { font-size: 12px; word-break: break-all; white-space: pre-line; }
        .btn-delete-note { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #c0392b; cursor: pointer; font-size: 14px; }

        /* Overlay */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .sidebar-overlay.active { display: block !important; }

        /* Navegação Principal */
        .navigation-bar { display: flex; justify-content: space-between; align-items: center; background-color: #fff; padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .nav-btn { background-color: #2980b9; color: white; border: none; padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .current-date { font-size: 18px; font-weight: bold; color: #2c3e50; }

        /* Formulário Princpal */
        .card-form { background-color: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 16px; color: #2c3e50; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 6px; }
        .input-text { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 4px; font-size: 14px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-col { flex: 1; min-width: 150px; }
        .select-field, .input-date, .input-time { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 4px; background-color: #fff; font-size: 14px; height: 42px; }
        .notify-box { display: flex; align-items: center; gap: 8px; background-color: #f1f2f6; padding: 10px 15px; border-radius: 4px; height: 42px; width: 100%; justify-content: center; font-size: 13px; font-weight: bold; color: #2c3e50; cursor: pointer; }
        .btn-add { width: 100%; background-color: #2a9d8f; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        /* Container de Listagem */
        .tasks-container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .no-tasks { text-align: center; color: #95a5a6; font-size: 14px; padding: 15px 0; }
        .day-label { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 10px; text-transform: uppercase; }

        /* Cards de Tarefas */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background-color: #f8f9fa; border-radius: 4px; margin-top: 10px; }
        .task-left-wrapper { display: flex; align-items: center; gap: 12px; flex: 1; }
        
        .task-item.cor-azul { border-left: 5px solid #3498db; }
        .task-item.cor-vermelho { border-left: 5px solid #e74c3c; }
        .task-item.cor-verde { border-left: 5px solid #2ecc71; }
        .task-item.cor-amarelo { border-left: 5px solid #f1c40f; }

        .check-btn { background: none; border: 2px solid #bdc3c7; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 10px; }
        
        .task-item.completed { opacity: 0.55; background-color: #f1f2f6; }
        .task-item.completed .check-btn { background-color: #2ecc71; border-color: #2ecc71; color: white; }
        .task-item.completed .task-title-text { text-decoration: line-through; color: #7f8c8d; }

        .task-info { display: flex; flex-direction: column; gap: 4px; }
        .task-title-text { font-weight: bold; color: #2c3e50; font-size: 15px; }
        .task-time-text { font-size: 12px; color: #7f8c8d; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; padding: 5px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Painel de Controle</h3>
            <button class="sidebar-close" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="menu-tabs">
            <button class="tab-btn active" id="tab-link-stats" onclick="switchTab('stats')"><i class="fa-solid fa-chart-pie"></i> Índices</button>
            <button class="tab-btn" id="tab-link-notes" onclick="switchTab('notes')"><i class="fa-regular fa-sticky-note"></i> Notas</button>
            <button class="tab-btn" id="tab-link-trash" onclick="switchTab('trash')"><i class="fa-solid fa-trash"></i> Lixeira (<span id="trash-count-badge">0</span>)</button>
        </div>
        
        <div class="tab-content active" id="tab-content-stats">
            <div class="stats-panel">
                <h4>Seu Relatório Geral</h4>
                <div class="stat-line"><span>Total Criadas:</span> <strong id="stat-total">0</strong></div>
                <div class="stat-line"><span>Pendentes:</span> <strong id="stat-pendentes" style="color: #f1c40f;">0</strong></div>
                <div class="stat-line"><span>Concluídas:</span> <strong id="stat-concluidas" style="color: #2ecc71;">0</strong></div>
            </div>
        </div>

        <div class="tab-content" id="tab-content-notes">
            <div class="notes-form">
                <input type="text" id="note-title" class="note-input-title" placeholder="Título da Nota...">
                <textarea id="note-body" class="note-input-body" placeholder="Escreva sua anotação aqui..."></textarea>
                <button class="btn-save-note" onclick="criarNota()">Criar Bloco de Nota</button>
            </div>
            <div class="notes-container-list" id="notes-list-target">
                </div>
        </div>

        <div class="tab-content" id="tab-content-trash">
            <h4 style="font-size: 12px; color:#bdc3c7; margin-bottom: 10px; text-transform: uppercase;">Itens Excluídos</h4>
            <div class="trash-list" id="trash-list-target">
                </div>
        </div>
    </div>

    <header class="header-main">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <div class="title-area">
                <h1>Minha Agenda</h1>
                <div class="auth-block">
                    <div id="g_id_onload"
                         data-client_id="884588851940-hu3aqqoc1ciibip94o8r5kn1snraahom.apps.googleusercontent.com"
                         data-callback="onSignIn"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
                </div>
            </div>
        </div>
        <div class="clock-container">
            <div class="clock-time" id="live-clock">00:00:00</div>
            <div class="clock-date" id="live-date">22/05/2026</div>
        </div>
    </header>

    <div class="day-label" id="day-of-week-label">Sexta-Feira</div>

    <section class="navigation-bar">
        <button class="nav-btn" onclick="alterarDia(-1)"><i class="fa-solid fa-caret-left"></i> Voltar</button>
        <span class="current-date" id="display-date">22/05/2026</span>
        <button class="nav-btn" onclick="alterarDia(1)">Avançar <i class="fa-solid fa-caret-right"></i></button>
    </section>

    <main class="card-form">
        <h2 class="card-title"><i class="fa-solid fa-plus"></i> Nova Tarefa</h2>
        <div class="form-group">
            <label>O que você precisa fazer?</label>
            <input type="text" class="input-text" id="task-name" placeholder="Ex: Reunião com cliente ou Academia">
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>Tipo de Tarefa</label>
                <select class="select-field">
                    <option>Tarefa Única (Data/Hora específica)</option>
                </select>
            </div>
            <div class="form-col">
                <label>Categoria (Cor)</label>
                <select class="select-field" id="task-category">
                    <option value="azul">🔵 Padrão (Azul)</option>
                    <option value="vermelho">🔴 Urgente (Vermelho)</option>
                    <option value="verde">🟢 Pessoal (Verde)</option>
                    <option value="amarelo">🟡 Trabalho (Amarelo)</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>Data</label>
                <input type="text" class="input-date" id="task-date-input" value="22/05/2026" readonly>
            </div>
            <div class="form-col">
                <label>Horário (Opcional)</label>
                <input type="time" class="input-time" id="task-time" value="14:00">
            </div>
            <div class="form-col" style="display: flex; align-items: flex-end;">
                <label class="notify-box">
                    <input type="checkbox" id="task-notify"> 🔔 Notificar-me
                </label>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="salvarTarefa()">Adicionar na Agenda</button>
    </main>

    <section class="tasks-container">
        <h3 style="font-size: 14px; margin-bottom: 5px; color: #34495e; text-transform: uppercase; font-weight: bold;">Tarefas do Dia</h3>
        <div id="tasks-list">
            <div class="no-tasks">Nenhuma tarefa marcada para este dia.</div>
        </div>
    </section>

    <script>
        let dataAtual = new Date("2026-05-22T00:00:00");
        
        // Memória do localStorage para os três tipos de dados
        let listaDeTarefas = JSON.parse(localStorage.getItem('minha_agenda_tarefas')) || [];
        let lixeiraDeTarefas = JSON.parse(localStorage.getItem('minha_agenda_lixeira')) || [];
        let listaDeNotas = JSON.parse(localStorage.getItem('minha_agenda_notas')) || [];

        document.addEventListener('DOMContentLoaded', function () {
            startClock();
            atualizarInterfaceData();
            renderizarNotas();
            renderizarLixeira();
        });

        function onSignIn(response) {
            const dataBase64 = response.credential.split('.')[1];
            const jsonString = window.atob(dataBase64);
            const usuario = JSON.parse(jsonString);
            alert("Bem-vindo, " + usuario.name);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').textContent = now.toTimeString().split(' ')[0];
                
                const dia = String(now.getDate()).padStart(2, '0');
                const mes = String(now.getMonth() + 1).padStart(2, '0');
                const ano = now.getFullYear();
                document.getElementById('live-date').textContent = `${dia}/${mes}/${ano}`;
            }, 1000);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Troca de Abas dentro do menu lateral
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            document.getElementById(`tab-link-${tabName}`).classList.add('active');
            document.getElementById(`tab-content-${tabName}`).classList.add('active');
        }

        function alterarDia(diasParaSomar) {
            dataAtual.setDate(dataAtual.getDate() + diasParaSomar);
            atualizarInterfaceData();
        }

        function atualizarInterfaceData() {
            const dia = String(dataAtual.getDate()).padStart(2, '0');
            const mes = String(dataAtual.getMonth() + 1).padStart(2, '0');
            const ano = dataAtual.getFullYear();
            const dataFormatada = `${dia}/${mes}/${ano}`;

            const diasSemana = ["Domingo", "Segunda-Feira", "Terça-Feira", "Quarta-Feira", "Quinta-Feira", "Sexta-Feira", "Sábado"];
            const nomeDiaSemana = diasSemana[dataAtual.getDay()];

            document.getElementById('day-of-week-label').textContent = nomeDiaSemana;
            document.getElementById('display-date').textContent = dataFormatada;
            document.getElementById('task-date-input').value = dataFormatada;

            renderizarTarefas();
            atualizarEstatisticasMenu();
        }

        /* --- LÓGICA DE TAREFAS --- */
        function salvarTarefa() {
            const inputNome = document.getElementById('task-name');
            const taskName = inputNome.value.trim();
            const taskTime = document.getElementById('task-time').value;
            const taskDate = document.getElementById('task-date-input').value.trim();
            const taskCategory = document.getElementById('task-category').value;
            
            if (!taskName) { 
                alert("Por favor, preencha o nome da tarefa!"); 
                return; 
            }

            const novaTarefa = {
                id: Date.now(),
                nome: taskName,
                data: taskDate, 
                horario: taskTime || "Sem horário",
                categoria: taskCategory,
                concluida: false
            };

            listaDeTarefas.push(novaTarefa);
            salvarDados('tarefas', listaDeTarefas);
            
            inputNome.value = ""; 
            atualizarInterfaceData();
        }

        function alternarConclusaoTarefa(id) {
            listaDeTarefas = listaDeTarefas.map(tarefa => {
                if (tarefa.id === id) tarefa.concluida = !tarefa.concluida;
                return tarefa;
            });
            salvarDados('tarefas', listaDeTarefas);
            atualizarInterfaceData();
        }

        // Move a tarefa para a Lixeira em vez de apagar de vez
        function moverParaLixeira(id) {
            const tarefaParaDeletar = listaDeTarefas.find(t => t.id === id);
            if (tarefaParaDeletar) {
                lixeiraDeTarefas.push(tarefaParaDeletar);
                listaDeTarefas = listaDeTarefas.filter(t => t.id !== id);
                
                salvarDados('tarefas', listaDeTarefas);
                salvarDados('lixeira', lixeiraDeTarefas);
                
                atualizarInterfaceData();
                renderizarLixeira();
            }
        }

        /* --- LÓGICA DA LIXEIRA --- */
        function restaurarTarefa(id) {
            const tarefaParaRestaurar = lixeiraDeTarefas.find(t => t.id === id);
            if (tarefaParaRestaurar) {
                listaDeTarefas.push(tarefaParaRestaurar);
                lixeiraDeTarefas = lixeiraDeTarefas.filter(t => t.id !== id);
                
                salvarDados('tarefas', listaDeTarefas);
                salvarDados('lixeira', lixeiraDeTarefas);
                
                atualizarInterfaceData();
                renderizarLixeira();
            }
        }

        function excluirDefinitivo(id) {
            if (confirm("Deseja mesmo excluir permanentemente esta tarefa? Não há como reverter.")) {
                lixeiraDeTarefas = lixeiraDeTarefas.filter(t => t.id !== id);
                salvarDados('lixeira', lixeiraDeTarefas);
                renderizarLixeira();
                atualizarEstatisticasMenu();
            }
        }

        function renderizarLixeira() {
            const container = document.getElementById('trash-list-target');
            document.getElementById('trash-count-badge').textContent = lixeiraDeTarefas.length;

            if (lixeiraDeTarefas.length === 0) {
                container.innerHTML = `<div style="font-size:12px; color:#bdc3c7; text-align:center; padding:10px;">Lixeira vazia.</div>`;
                return;
            }

            container.innerHTML = "";
            lixeiraDeTarefas.forEach(tarefa => {
                const itemHtml = `
                    <div class="trash-item">
                        <div>
                            <strong style="display:block; color:#fff;">${tarefa.nome}</strong>
                            <small style="color:#bdc3c7;">${tarefa.data} - ${tarefa.horario}</small>
                        </div>
                        <div class="trash-actions">
                            <button class="btn-restore" onclick="restaurarTarefa(${tarefa.id})" title="Restaurar para Agenda"><i class="fa-solid fa-rotate-left"></i></button>
                            <button class="btn-destroy" onclick="excluirDefinitivo(${tarefa.id})" title="Apagar para sempre"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        /* --- LÓGICA DO BLOCO DE NOTAS --- */
        function criarNota() {
            const titleInput = document.getElementById('note-title');
            const bodyInput = document.getElementById('note-body');
            
            const titulo = titleInput.value.trim();
            const texto = bodyInput.value.trim();

            if (!texto) {
                alert("Escreva alguma coisa no bloco de notas antes de salvar!");
                return;
            }

            const novaNota = {
                id: Date.now(),
                titulo: titulo || "Nota Sem Título",
                texto: texto
            };

            listaDeNotas.push(novaNota);
            salvarDados('notas', listaDeNotas);

            titleInput.value = "";
            bodyInput.value = "";
            renderizarNotas();
        }

        function deletarNota(id) {
            listaDeNotas = listaDeNotas.filter(n => n.id !== id);
            salvarDados('notas', listaDeNotas);
            renderizarNotas();
        }

        function renderizarNotas() {
            const container = document.getElementById('notes-list-target');
            if (listaDeNotas.length === 0) {
                container.innerHTML = `<div style="font-size:12px; color:#bdc3c7; text-align:center; padding:10px;">Nenhum bloco de nota criado.</div>`;
                return;
            }

            container.innerHTML = "";
            listaDeNotas.forEach(nota => {
                const cardHtml = `
                    <div class="note-card">
                        <h5>${nota.titulo}</h5>
                        <p>${nota.texto}</p>
                        <button class="btn-delete-note" onclick="deletarNota(${nota.id})" title="Excluir nota"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        /* --- UTILITÁRIOS --- */
        function salvarDados(chave, dados) {
            localStorage.setItem(`minha_agenda_${chave}`, JSON.stringify(dados));
        }

        function atualizarEstatisticasMenu() {
            const total = listaDeTarefas.length;
            const concluidas = listaDeTarefas.filter(t => t.concluida).length;
            const pendentes = total - concluidas;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pendentes').textContent = pendentes;
            document.getElementById('stat-concluidas').textContent = concluidas;
        }

        function renderizarTarefas() {
            const listaContainer = document.getElementById('tasks-list');
            const dataFormatadaAtual = document.getElementById('display-date').textContent.trim();
            const tarefasDoDia = listaDeTarefas.filter(tarefa => tarefa.data === dataFormatadaAtual);

            if (tarefasDoDia.length === 0) {
                listaContainer.innerHTML = `<div class="no-tasks">Nenhuma tarefa marcada para este dia.</div>`;
                return;
            }

            tarefasDoDia.sort((a, b) => a.horario.localeCompare(b.horario));
            listaContainer.innerHTML = ""; 
            
            tarefasDoDia.forEach(tarefa => {
                const classeConcluida = tarefa.concluida ? 'completed' : '';
                
                const itemHtml = `
                    <div class="task-item cor-${tarefa.categoria} ${classeConcluida}">
                        <div class="task-left-wrapper">
                            <button class="check-btn" onclick="alternarConclusaoTarefa(${tarefa.id})">
                                <i class="fa-solid fa-check"></i>
                            </button>
                            <div class="task-info">
                                <span class="task-title-text">${tarefa.nome}</span>
                                <span class="task-time-text"><i class="fa-regular fa-clock"></i> ${tarefa.horario}</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="moverParaLixeira(${tarefa.id})" title="Mover para lixeira">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                listaContainer.insertAdjacentHTML('beforeend', itemHtml);
            });
        }
    </script>
</body>
</html>
